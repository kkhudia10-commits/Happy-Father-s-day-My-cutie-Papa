<!DOCTYPE html>
<html>
<head>
    <title>Happy Father's Day</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        .card{
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        h1{
            color: #2c3e50;
        }
        p{
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>❤️ Happy Father's Day ❤️</h1>
        <p>Dear Dad,</p>
        <p>
            Thank you for your love, support, and guidance.
            You are my hero and my inspiration.
        </p>
        <p><strong>Love You, Dad!</strong></p>
        <p>— Your Son, Kamal</p>
    </div>
</body>
</html>
